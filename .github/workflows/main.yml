name: Hourly Recall Check

on:
  schedule:
    # 這裡的設定代表每小時執行一次 (例如 1:00, 2:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # 保留手動執行的按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要套件
        run: |
          pip install pandas requests

      - name: 執行回憶檢查
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python check_recall.py

