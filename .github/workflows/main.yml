name: Daily Recall Check

on:
  schedule:
    - cron: '0 0 * * *' # 每天早上 8 點 (台灣時間)
  workflow_dispatch: # 允許手動測試執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas

      - name: Run check
        run: python check_recall.py
