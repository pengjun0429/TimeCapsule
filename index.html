<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回憶 Recall - 時空膠囊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap');
        
        body {
            background: #1a1f35;
            color: #e94560;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-h-screen;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-text {
            color: #8a94ad;
            font-size: 12px;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .label {
            color: #e94560;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.8;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.08);
        }

        textarea {
            resize: none;
            font-size: 24px;
            font-weight: 700;
        }

        .submit-btn {
            width: 100%;
            background: #f05454;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 20px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(240, 84, 84, 0.3);
        }

        .submit-btn:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        #hidden_iframe { display: none; }
        
        .success-overlay {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>

    <script type="text/javascript">var submitted=false;</script>
    <iframe name="hidden_iframe" id="hidden_iframe" onload="if(submitted) {showSuccess();}"></iframe>

    <div id="form-container" class="container">
        <div class="header-text">RECALL THE MOMENT/留給你自己的話</div>

        <!-- 這裡的 action 網址請務必換成你表單真正的 Google formResponse 連結 -->
        <form action="https://docs.google.com/forms/d/e/1FAIpQLSd7S7a5_v8Nf6r9F0F5-N8p9X8p9X8p9X8p9X8p9X8p9X8p9X/formResponse" 
              method="POST" 
              target="hidden_iframe" 
              onsubmit="submitted=true;">
            
            <div class="input-group">
                <label class="label">INSTAGRAM ID</label>
                <input type="text" name="entry.1163321467" placeholder="@" required>
            </div>

            <div class="input-group">
                <label class="label">封存的內容</label>
                <textarea name="entry.372515629" rows="4" placeholder="寫給未來的自己..." required></textarea>
            </div>

            <div class="input-group">
                <label class="label">開啟日期</label>
                <input type="date" name="entry.1806256761" required>
            </div>

            <button type="submit" class="submit-btn">封存回憶</button>
        </form>
    </div>

    <div id="success-message" class="success-overlay">
        <h2 style="font-size: 32px; color: white; letter-spacing: 5px;">回憶已封存</h2>
        <p style="color: #8a94ad; letter-spacing: 2px;">我們在未來相見。</p>
    </div>

    <script>
        function showSuccess() {
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-message').style.display = 'flex';
        }
    </script>
</body>
</html>
