<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回憶 Recall - 時空膠囊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f3460 100%);
            color: #e94560;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        input, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        input:focus, textarea:focus {
            border-color: #e94560 !important;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.3) !important;
        }
        #hidden_iframe { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <script type="text/javascript">var submitted=false;</script>
    <iframe name="hidden_iframe" id="hidden_iframe" onload="if(submitted) {showSuccess();}"></iframe>

    <div id="form-container" class="glass w-full max-w-md p-10 shadow-2xl text-center transition-all duration-500">
        <h1 class="text-4xl font-bold mb-3 tracking-[0.3em] ml-3"不要看我,看底下</h1>
        <p class="text-gray-400 text-sm mb-10 tracking-widest">RECALL THE MOMENT</p>

        <form action="https://docs.google.com/forms/d/e/1FAIpQLSc7y7O-T_v0o_kY4VzH7VzH7VzH7VzH7VzH7VzH7VzH7VzH/formResponse" 
      method="POST" 
      target="hidden_iframe" 
      class="space-y-6 text-left">
    
    <input type="text" name="entry.1163321467" placeholder="IG ID" required>
    <textarea name="entry.372515629" placeholder="內容" required></textarea>
    <input type="text" name="entry.1806256761" placeholder="YYYY/MM/DD" required>
    
    <button type="submit">封存回憶</button>
</form>
            
            <div>
                <label class="block text-[10px] uppercase tracking-widest mb-2 opacity-50">Instagram ID</label>
                <input type="text" name="entry.1163321467" placeholder="@" class="w-full p-3 rounded-xl focus:outline-none transition" required>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest mb-2 opacity-50">封存的內容</label>
                <textarea name="entry.372515629" rows="4" placeholder="寫給未來的自己..." class="w-full p-3 rounded-xl focus:outline-none transition" required></textarea>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest mb-2 opacity-50">開啟日期</label>
                <input type="date" name="entry.1806256761" class="w-full p-3 rounded-xl focus:outline-none transition" required>
            </div>

            <button type="submit" class="w-full bg-[#e94560] hover:bg-[#ff4d6d] text-white font-medium py-4 rounded-2xl shadow-lg transform transition active:scale-95 tracking-widest mt-4">
                封 存 回 憶
            </button>
        </form>
    </div>

    <div id="success-message" class="hidden text-center animate-pulse">
        <h2 class="text-3xl font-light tracking-widest text-white mb-4">回憶已送往未來</h2>
        <p class="text-gray-400">時間到了，我們會再相見。</p>
    </div>

    <script>
        function showSuccess() {
            document.getElementById('form-container').classList.add('opacity-0', 'scale-90');
            setTimeout(() => {
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-message').classList.remove('hidden');
            }, 500);
        }
    </script>
</body>
</html>
